<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ceramic Instrument</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@300;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #08090d;
      --surface:  #0f1118;
      --border:   #1e2230;
      --muted:    #475569;
      --text:     #e2e8f0;
      --m1-lo:    #b45309;
      --m1-mid:   #f59e0b;
      --m1-glow:  rgba(245,158,11,.4);
      --m2-lo:    #0e7490;
      --m2-mid:   #22d3ee;
      --m2-glow:  rgba(34,211,238,.4);
      --accent:   var(--m1-mid);
      --glow:     var(--m1-glow);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 28px 16px 40px; overflow-x: hidden;
    }
    #viz {
      position: fixed; inset: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    header, #modeBanner, #pads, #seqBar,
    #threshPanel, #statusEl, #connectBtn, #log { position: relative; z-index: 1; }

    /* Header */
    header { text-align: center; margin-bottom: 28px; }
    .logo {
      font-family: 'Unbounded', sans-serif; font-weight: 700;
      font-size: clamp(1.3rem, 4vw, 1.9rem); letter-spacing: .08em;
      color: var(--accent); text-shadow: 0 0 28px var(--glow);
      transition: color .5s, text-shadow .5s;
    }
    .subtitle {
      font-size: .65rem; letter-spacing: .25em; color: var(--muted);
      margin-top: 5px; text-transform: uppercase;
    }

    /* Mode Banner */
    #modeBanner {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 22px; border: 1px solid var(--border);
      border-radius: 4px; background: var(--surface); margin-bottom: 28px;
    }
    .dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 8px var(--glow);
      animation: pulse 1.8s ease-in-out infinite;
      transition: background .5s, box-shadow .5s;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.5; transform:scale(.8); }
    }
    .mode-lbl { font-size: .62rem; letter-spacing: .18em; color: var(--muted); }
    #modeName {
      font-family: 'Unbounded', sans-serif; font-size: .85rem; font-weight: 700;
      color: var(--accent); transition: color .5s; min-width: 90px;
    }
    .mode-hint {
      font-size: .58rem; letter-spacing: .12em; color: var(--muted);
      border-left: 1px solid var(--border); padding-left: 12px;
    }

    /* Pads */
    #pads { display: flex; gap: 14px; margin-bottom: 32px; flex-wrap: wrap; justify-content: center; }
    .pad { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .pad-btn {
      width: 76px; height: 148px; border-radius: 60px;
      border: 1.5px solid var(--border);
      background: linear-gradient(180deg, var(--surface) 0%, #0a0c12 100%);
      position: relative; overflow: hidden;
      transition: border-color .12s, box-shadow .12s;
    }
    .pad-fill {
      position: absolute; bottom: 0; left: 0; right: 0; height: 0%;
      background: linear-gradient(0deg, var(--m1-lo), var(--m1-mid));
      transition: height .07s ease-out, background .5s;
      border-radius: 0 0 60px 60px;
    }
    .pad-glow-el {
      position: absolute; inset: 0; border-radius: 60px; opacity: 0;
      background: radial-gradient(ellipse at 50% 85%, var(--m1-glow), transparent 65%);
      transition: opacity .1s, background .5s;
    }
    .pad-sol {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Unbounded', sans-serif; font-size: .6rem; font-weight: 700;
      color: rgba(255,255,255,.12); z-index: 2; pointer-events: none;
      transition: color .12s;
    }
    .pad.active .pad-btn   { border-color: var(--accent); box-shadow: 0 0 22px var(--glow); }
    .pad.active .pad-fill  { height: 100%; }
    .pad.active .pad-glow-el { opacity: 1; }
    .pad.active .pad-sol   { color: rgba(255,255,255,.75); }
    .pad.seq .pad-btn { border-color: #818cf8; box-shadow: 0 0 14px rgba(129,140,248,.5); }
    .pad-note { font-size: .62rem; letter-spacing: .08em; color: var(--muted); transition: color .12s; }
    .pad.active .pad-note { color: var(--accent); }

    /* Seq bar */
    #seqBar {
      width: 100%; max-width: 500px; height: 3px;
      background: var(--border); border-radius: 4px; margin-bottom: 28px; overflow: hidden;
    }
    #seqFill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #6366f1, #a78bfa);
      border-radius: 4px; box-shadow: 0 0 8px rgba(99,102,241,.6);
      transition: width .14s ease-out;
    }

    /* Threshold */
    #threshPanel {
      width: 100%; max-width: 500px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 14px 18px; margin-bottom: 18px;
    }
    .tp-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
    .tp-lbl { font-size: .62rem; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); }
    #threshVal {
      font-family: 'Unbounded', sans-serif; font-size: 1rem; font-weight: 700;
      color: var(--accent); transition: color .5s;
    }
    #threshSent { font-size: .58rem; letter-spacing: .15em; color: #4ade80; opacity: 0; transition: opacity .3s; margin-left: 7px; }
    #threshSlider {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 4px; border-radius: 4px; outline: none; cursor: pointer;
      background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--fill,40%), var(--border) var(--fill,40%), var(--border) 100%);
    }
    #threshSlider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 17px; height: 17px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 9px var(--glow); cursor: grab;
      transition: background .5s, box-shadow .5s;
    }
    .tp-ticks { display: flex; justify-content: space-between; margin-top: 5px; }
    .tp-ticks span { font-size: .58rem; color: var(--muted); }

    /* Connect / status */
    #statusEl { font-size: .67rem; letter-spacing: .15em; color: var(--muted); margin-bottom: 16px; }
    #statusEl.ok  { color: #4ade80; }
    #statusEl.err { color: #f87171; }
    #connectBtn {
      font-family: 'Space Mono', monospace; font-size: .75rem; letter-spacing: .15em;
      padding: 13px 32px; border: 1.5px solid var(--accent);
      background: transparent; color: var(--accent); border-radius: 2px;
      cursor: pointer; text-transform: uppercase;
      transition: background .2s, color .2s, box-shadow .2s, border-color .5s;
      margin-bottom: 22px;
    }
    #connectBtn:hover:not(:disabled) { background: var(--accent); color: var(--bg); box-shadow: 0 0 22px var(--glow); }
    #connectBtn:disabled { opacity: .38; cursor: not-allowed; }

    /* Log */
    #log {
      width: 100%; max-width: 500px; height: 140px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 4px; padding: 10px 14px; overflow-y: auto;
      font-size: .7rem; line-height: 1.65; color: var(--muted);
    }
    #log::-webkit-scrollbar { width: 4px; }
    #log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .l-sys  { color: #64748b; }
    .l-mode { color: #a78bfa; font-weight: bold; }

    /* Mode-2 overrides */
    body.mode2 { --accent: var(--m2-mid); --glow: var(--m2-glow); }
    body.mode2 .pad-fill      { background: linear-gradient(0deg, var(--m2-lo), var(--m2-mid)); }
    body.mode2 .pad-glow-el   { background: radial-gradient(ellipse at 50% 85%, var(--m2-glow), transparent 65%); }

    /* Flash */
    #flash { position: fixed; inset: 0; pointer-events: none; opacity: 0; z-index: 999; transition: opacity .08s; }
  </style>
</head>
<body>

<canvas id="viz"></canvas>
<div id="flash"></div>

<header>
  <div class="logo">CERAMIC INSTRUMENT</div>
</header>

<div id="modeBanner">
  <div class="dot"></div>
  <span class="mode-lbl">MODE</span>
  <span id="modeName">SINE</span>
  <span class="mode-hint">Do → Re → Mi → Fa → So to switch</span>
</div>

<div id="pads"></div>
<div id="seqBar"><div id="seqFill"></div></div>

<div id="threshPanel">
  <div class="tp-row">
    <span class="tp-lbl">Touch Threshold</span>
    <span><span id="threshVal">40</span><span id="threshSent">✓ sent</span></span>
  </div>
  <input type="range" id="threshSlider" min="5" max="80" value="40" step="1">
  <div class="tp-ticks"><span>5 — sensitive</span><span>80 — firm</span></div>
</div>

<div id="statusEl">STATUS: DISCONNECTED</div>
<button id="connectBtn">▶ Connect Serial Port</button>
<div id="log"></div>

<script>
// ── Notes (5 only) ────────────────────────────────────
const NOTES = [
  { sol:"Do", label:"C4", freq:261.63 },
  { sol:"Re", label:"D4", freq:293.66 },
  { sol:"Mi", label:"E4", freq:329.63 },
  { sol:"Fa", label:"F4", freq:349.23 },
  { sol:"So", label:"G4", freq:392.00 },
];
const N = NOTES.length;

// ── Web Audio Setup ───────────────────────────────────
// Ported from your reference code.
// Polyphony fix: DynamicsCompressor prevents clipping when
// multiple notes play simultaneously (constructive interference).
const AudioCtx  = window.AudioContext || window.webkitAudioContext;
const audioCtx  = new AudioCtx();

// ADSR (from your reference, tuned for fabric touch)
const ATK = 0.02;   // attack  s
const DEC = 0.08;   // decay   s
const SUS = 0.65;   // sustain level (0-1)
const REL = 0.45;   // release s

// Master gain kept low so N simultaneous voices don't clip
// (0.18 × 5 voices × SUS 0.65 ≈ 0.59 peak before compressor)
const masterGain = audioCtx.createGain();
masterGain.gain.setValueAtTime(0.18, audioCtx.currentTime);

// Compressor handles transients and any remaining peaks
const compressor = audioCtx.createDynamicsCompressor();
compressor.threshold.value = -6;   // dBFS
compressor.knee.value       = 4;
compressor.ratio.value      = 6;   // 6:1
compressor.attack.value     = 0.003;
compressor.release.value    = 0.18;

const analyser  = audioCtx.createAnalyser();
analyser.fftSize = 2048;
const bufLen    = analyser.frequencyBinCount;
const waveArr   = new Uint8Array(bufLen);


masterGain.connect(compressor);
compressor.connect(analyser);
analyser.connect(audioCtx.destination);


const voices      = new Array(N).fill(null); 
let   currentMode = 1;

function getOscType() { return currentMode === 1 ? "sine" : "sawtooth"; }

function noteOn(idx) {
  if (voices[idx]) return;
  if (audioCtx.state === "suspended") audioCtx.resume();

  const now  = audioCtx.currentTime;
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = getOscType();
  osc.frequency.setValueAtTime(NOTES[idx].freq, now);
  osc.connect(gain);
  gain.connect(masterGain);

  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(1, now + ATK);
  gain.gain.exponentialRampToValueAtTime(SUS, now + ATK + DEC);

  osc.start(now);
  voices[idx] = { osc, gain };
  padEls[idx].classList.add("active");
  updateHue();
}

function noteOff(idx) {
  const v = voices[idx];
  if (!v) return;
  const now = audioCtx.currentTime;


  v.gain.gain.cancelScheduledValues(now);
  v.gain.gain.setValueAtTime(v.gain.gain.value, now);
  v.gain.gain.setTargetAtTime(0, now, REL / 5);  

  v.osc.stop(now + REL + 0.1);
  setTimeout(() => { v.osc.disconnect(); v.gain.disconnect(); }, (REL + 0.2) * 1000);

  voices[idx] = null;
  padEls[idx].classList.remove("active");
  updateHue();
}


const canvas    = document.getElementById("viz");
const canvasCtx = canvas.getContext("2d");

function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

let currentHue = 40, targetHue = 40;

function draw() {
  requestAnimationFrame(draw);
  analyser.getByteTimeDomainData(waveArr);

  canvasCtx.fillStyle = "rgba(8,9,13,0.35)";
  canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

  currentHue += (targetHue - currentHue) * 0.08;
  canvasCtx.lineWidth   = 2.5;
  canvasCtx.strokeStyle = `hsl(${currentHue}, 80%, 62%)`;
  canvasCtx.shadowBlur  = 18;
  canvasCtx.shadowColor = `hsl(${currentHue}, 80%, 55%)`;

  canvasCtx.beginPath();
  const sw = canvas.width / bufLen;
  let x = 0;
  for (let i = 0; i < bufLen; i++) {
    const y = (waveArr[i] / 128.0) * (canvas.height * 0.38);
    i === 0 ? canvasCtx.moveTo(x, y) : canvasCtx.lineTo(x, y);
    x += sw;
  }
  canvasCtx.lineTo(canvas.width, canvas.height * 0.38);
  canvasCtx.stroke();
}
draw();

function updateHue() {
  const active = NOTES.filter((_, i) => voices[i]);
  if (!active.length) return;
  const avg = active.reduce((s, n) => s + n.freq, 0) / active.length;
  // Mode 1: warm amber (30-60), Mode 2: cool cyan (175-195)
  targetHue = currentMode === 1
    ? 30 + ((avg - 261) / 130) * 30
    : 175 + ((avg - 261) / 130) * 20;
}

// ── DOM Pads ──────────────────────────────────────────
const padsEl = document.getElementById("pads");
const padEls = [];

NOTES.forEach((n, i) => {
  const div = document.createElement("div");
  div.className = "pad";
  div.innerHTML = `
    <div class="pad-btn">
      <div class="pad-fill"></div>
      <div class="pad-glow-el"></div>
      <div class="pad-sol">${n.sol}</div>
    </div>
    <div class="pad-note">${n.label}</div>`;
  padsEl.appendChild(div);
  padEls.push(div);
});

// ── Sequence Detection ────────────────────────────────
// Target: Do(0) → Re(1) → Mi(2) → Fa(3) → So(4)
let seqBuf = [-1,-1,-1,-1,-1], seqHead = 0;

function recordNote(idx) {
  seqBuf[seqHead] = idx;
  seqHead = (seqHead + 1) % 5;

  // Count matching prefix from the oldest slot forward
  let matchLen = 0;
  for (let i = 0; i < 5; i++) {
    if (seqBuf[(seqHead + i) % 5] === i) matchLen++;
    else break;
  }

  document.getElementById("seqFill").style.width = (matchLen / 5 * 100) + "%";

  if (matchLen > 0) {
    padEls[matchLen - 1].classList.add("seq");
    setTimeout(() => padEls[matchLen - 1].classList.remove("seq"), 280);
  }
}


function applyMode(mode) {
  currentMode = mode;

  for (let i = 0; i < N; i++) noteOff(i);

  document.body.classList.toggle("mode2", mode === 2);
  document.getElementById("modeName").textContent = mode === 1 ? "SINE" : "SAWTOOTH";

  seqBuf  = [-1,-1,-1,-1,-1];
  seqHead = 0;
  document.getElementById("seqFill").style.width = "0%";
  targetHue = mode === 1 ? 40 : 185;

  const f = document.getElementById("flash");
  f.style.background = mode === 1 ? "rgba(245,158,11,.13)" : "rgba(34,211,238,.13)";
  f.style.opacity = "1";
  setTimeout(() => f.style.opacity = "0", 160);

  addLog(`⟳ Mode ${mode}: ${mode === 1 ? "SINE" : "SAWTOOTH"}`, "l-mode");
}

// ── Serial ────────────────────────────────────────────
let port, writer, serialBuf = "";

function processLine(line) {
  line = line.trim();
  if (!line) return;
  addLog("← " + line, "l-sys");

  const onM = line.match(/^T(\d):(\d+)$/);
  if (onM) {
    const idx = parseInt(onM[1]) - 1;
    if (idx >= 0 && idx < N) { noteOn(idx); recordNote(idx); }
    return;
  }

  const offM = line.match(/^T(\d):OFF$/i);
  if (offM) {
    const idx = parseInt(offM[1]) - 1;
    if (idx >= 0 && idx < N) noteOff(idx);
    return;
  }

  const modeM = line.match(/^MODE:(\d)$/);
  if (modeM) applyMode(parseInt(modeM[1]));
}

document.getElementById("connectBtn").addEventListener("click", async () => {
  if (audioCtx.state === "suspended") audioCtx.resume();
  try {
    port = await navigator.serial.requestPort();
    await port.open({ baudRate: 115200 });

    setStatus("CONNECTED ✓", "ok");
    document.getElementById("connectBtn").textContent = "Connected";
    document.getElementById("connectBtn").disabled = true;
    addLog("Serial connected — waiting for touch events…", "l-sys");

    const enc = new TextEncoderStream();
    enc.readable.pipeTo(port.writable);
    writer = enc.writable.getWriter();
    sendThresh(parseInt(document.getElementById("threshSlider").value));

    const dec = new TextDecoderStream();
    port.readable.pipeTo(dec.writable);
    const rdr = dec.readable.getReader();
    (async () => {
      while (true) {
        const { value, done } = await rdr.read();
        if (done) { rdr.releaseLock(); break; }
        if (value) {
          serialBuf += value;
          const lines = serialBuf.split("\n");
          serialBuf = lines.pop();
          lines.forEach(processLine);
        }
      }
    })();
  } catch (err) {
    setStatus("ERROR: " + err.message, "err");
    addLog("Connection failed: " + err.message, "l-sys");
  }
});

// ── Threshold slider ──────────────────────────────────
async function sendThresh(val) {
  if (!writer) return;
  try {
    await writer.write(`THRESH:${val}\n`);
    const el = document.getElementById("threshSent");
    el.style.opacity = "1";
    setTimeout(() => el.style.opacity = "0", 900);
    addLog(`→ THRESH:${val}`, "l-sys");
  } catch(e) {}
}

let thDb = null;
const slider = document.getElementById("threshSlider");
slider.addEventListener("input", () => {
  const v = slider.value;
  document.getElementById("threshVal").textContent = v;
  slider.style.setProperty("--fill", ((v - 5) / 75 * 100).toFixed(1) + "%");
  clearTimeout(thDb);
  thDb = setTimeout(() => sendThresh(v), 120);
});
slider.style.setProperty("--fill", ((slider.value - 5) / 75 * 100).toFixed(1) + "%");

// ── Helpers ───────────────────────────────────────────
function setStatus(msg, cls) {
  const el = document.getElementById("statusEl");
  el.textContent = "STATUS: " + msg;
  el.className = cls || "";
}
function addLog(msg, cls) {
  const div = document.getElementById("log");
  const ln  = document.createElement("div");
  if (cls) ln.className = cls;
  ln.textContent = msg;
  div.appendChild(ln);
  if (div.children.length > 120) div.removeChild(div.firstChild);
  div.scrollTop = div.scrollHeight;
}
</script>
</body>
</html>
